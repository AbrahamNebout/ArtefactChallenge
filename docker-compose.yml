version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: waba-minio
    ports:
      - "9000:9000"   
      - "9001:9001"   
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waba-network

  minio-init:
    image: minio/mc:latest
    container_name: waba-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing local/raw-landing;
      mc mb --ignore-existing local/lakehouse;
      mc mb --ignore-existing local/archive;
      exit 0;
      "
    networks:
      - waba-network

  data-generator:
    build: ./data-generator
    container_name: waba-data-generator
    ports:
      - "8501:8501"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./data-generator:/app
    networks:
      - waba-network

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: waba-iceberg-rest
    user: root
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3://lakehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      AWS_REGION: us-east-1
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:sqlite:/data/iceberg_catalog.db
      CATALOG_JDBC_SCHEMA__VERSION: V1
    volumes:
      - iceberg-catalog-data:/data
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks:
      - waba-network

  spark-job-runner:
    build: ./spark-jobs
    container_name: waba-spark-runner
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}        
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}  
    depends_on:
      - iceberg-rest
    volumes:
      - ./spark-jobs:/app
      - spark-ivy-cache:/root/.ivy2
    networks:
      - waba-network
    command: tail -f /dev/null

  trino:
    image: trinodb/trino:latest
    container_name: waba-trino
    ports:
      - "8080:8080"
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    depends_on:
      - iceberg-rest
    networks:
      - waba-network

networks:
  waba-network:
    name: waba-network
    driver: bridge

volumes:
  minio-data:
  spark-ivy-cache:
  iceberg-catalog-data:
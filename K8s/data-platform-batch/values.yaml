minio:
  persistence:
    size: 5Gi
  buckets:
    - name: raw-landing
      policy: none
      purge: false
      versioning: false
      objectlocking: false
    - name: lakehouse
      policy: none
      purge: false
      versioning: false
      objectlocking: false
    - name: archive
      policy: none
      purge: false
      versioning: false
      objectlocking: false
    - name: airflow-logs
      policy: none
      purge: false
      versioning: false
      objectlocking: false




airflow:
  executor: CeleryExecutor
 
  images:
    airflow:
      repository: abraneb97/mci-airflow
      tag: "latest"
      pullPolicy: IfNotPresent
 
  # ------------------------------------------------------------
  # Workers Celery : remplace les pods éphémères du KubernetesExecutor
  # par un pool fixe de 2 workers permanents qui traitent gate/check_file
  # et submit (submit se contente d'appeler l'API K8s pour créer la CRD
  # SparkApplication -- le pod driver Spark reste créé séparément par
  # le spark-operator, indépendamment du nombre de workers Celery).
  # ------------------------------------------------------------
  workers:
    replicas: 2
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
 
  # ------------------------------------------------------------
  # Redis : requis comme broker Celery. Le chart officiel Airflow
  # le déploie automatiquement si non désactivé explicitement.
  # ------------------------------------------------------------
  redis:
    enabled: true
    persistence:
      enabled: true
      size: 1Gi
 
  config:
    core:
      dagbag_import_timeout: "120"
 
    logging:
      remote_logging: "True"
      remote_base_log_folder: "s3://airflow-logs/"
      remote_log_conn_id: "minio_s3_conn"
 
  dags:
    gitSync:
      enabled: true
      repo: https://github.com/AbrahamNebout/ArtefactChallenge.git
      branch: master
      rev: HEAD
      depth: 1
      maxFailures: 0
      subPath: "K8s/dag"
      credentialsSecret: git-credentials


spark-operator:
  sparkJobNamespaces:
    - default

  webhook:
    enable: true
  

dataGenerator:
  enabled: true

  image:
    repository: abraneb97/app-generator-k8s
    tag: "latest"         
    pullPolicy: IfNotPresent

  service:
    type: NodePort
    nodePort: 30911

  resources: {}

trino: {}

iceberg:
  enabled: true
  warehouseBucket: lakehouse  
  postgres:
    user: iceberg
    password: iceberg         
    database: iceberg_catalog
    persistence:
      size: 2Gi
---
# ============================================================
# 1. ServiceAccount utilisé par les pods driver/executor Spark
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: default

---
# ============================================================
# 2. Role : le driver Spark doit pouvoir créer/gérer les pods
#    executors, les services (headless service driver<->executors)
#    et les configmaps (config Spark montée dans les executors).
#    C'est le RBAC minimal recommandé par le spark-operator.
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-driver-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]

---
# ============================================================
# 3. Binding : associe le ServiceAccount au Role ci-dessus
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-driver-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: default
roleRef:
  kind: Role
  name: spark-driver-role
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spark-ivy-cache-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
  # storageClassName: standard   # décommente et adapte si besoin
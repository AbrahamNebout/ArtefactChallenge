---
# ============================================================
# 1. ServiceAccount utilisé par les pods driver/executor Spark
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: default

---
# ============================================================
# 2. Role : le driver Spark doit pouvoir créer/gérer les pods
#    executors, les services (headless service driver<->executors)
#    et les configmaps (config Spark montée dans les executors).
#    C'est le RBAC minimal recommandé par le spark-operator.
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-driver-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "update", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "deletecollection"]

---
# ============================================================
# 3. Binding : associe le ServiceAccount au Role ci-dessus
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-driver-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: default
roleRef:
  kind: Role
  name: spark-driver-role
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================
# 4. Role : autorise Airflow (ServiceAccount du worker) à créer
#    et gérer les ressources CRD SparkApplication elles-mêmes.
#    Étape distincte et PRÉALABLE à celle du driver Spark ci-dessus :
#    ici Airflow demande à Kubernetes "crée-moi un SparkApplication",
#    ce qui déclenche ensuite le spark-operator, qui lui-même
#    créera le pod driver (avec le ServiceAccount "spark" plus haut).
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-spark-application-role
  namespace: default
rules:
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications", "sparkapplications/status"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

---
# ============================================================
# 5. Binding : associe le ServiceAccount du worker Airflow au Role
#    ci-dessus. ⚠️ Vérifie que ce nom correspond bien à celui généré
#    par ton release Helm (kubectl get serviceaccounts | grep airflow).
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-spark-application-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: data-platform-airflow-worker
    namespace: default
roleRef:
  kind: Role
  name: airflow-spark-application-role
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spark-ivy-cache-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
  # storageClassName: standard   # décommente et adapte si besoin